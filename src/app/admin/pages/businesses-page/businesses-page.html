<main class="flex-grow p-6">
  <div class="flex items-center justify-between">
    <h1 class="text-3xl font-bold text-gray-800">Gestión de Comercios</h1>
    <button
      class="flex items-center px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
    >
      <svg
        class="w-5 h-5 mr-2"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 6v6m0 0v6m0-6h6m-6 0H6"
        ></path>
      </svg>
      Crear Comercio
    </button>
  </div>

  <div class="mt-6">
    <div class="p-6 bg-white rounded-lg shadow-md">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-semibold text-gray-800">Lista de Comercios</h2>
        <div class="relative">
          <input
            type="text"
            class="w-full py-2 pl-10 pr-4 border border-gray-200 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Buscar comercio..."
          />
          <div
            class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none"
          >
            <svg
              class="w-5 h-5 text-gray-400"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              ></path>
            </svg>
          </div>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr
              class="text-xs font-semibold tracking-wide text-left text-gray-500 uppercase border-b"
            >
              <th class="px-4 py-3">Nombre</th>
              <th class="px-4 py-3">Propietario</th>
              <th class="px-4 py-3">Categoría</th>
              <th class="px-4 py-3">Estado</th>
              <th class="px-4 py-3 text-center">Acciones</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y">
            @for (business of businesses; track business.id) {
            <tr class="text-gray-700">
              <td class="px-4 py-3 text-sm">{{ business.name }}</td>
              <td class="px-4 py-3 text-sm">{{ business.owner }}</td>
              <td class="px-4 py-3 text-sm">{{ business.category }}</td>
              <td class="px-4 py-3 text-xs">
                <span
                  class="px-2 py-1 font-semibold leading-tight rounded-full"
                  [class.bg-green-100]="business.status === 'verificado'"
                  [class.text-green-700]="business.status === 'verificado'"
                  [class.bg-yellow-100]="business.status === 'pendiente'"
                  [class.text-yellow-700]="business.status === 'pendiente'"
                >
                  {{ business.status }}
                </span>
              </td>
              <td class="px-4 py-3 text-sm text-center">
                <button
                  class="p-2 text-blue-500 transition-colors duration-150 bg-blue-100 rounded-full hover:bg-blue-200 focus:outline-none"
                >
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path
                      d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"
                    ></path>
                    <path
                      fill-rule="evenodd"
                      d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"
                      clip-rule="evenodd"
                    ></path>
                  </svg>
                </button>
                <button
                  class="p-2 ml-2 text-red-500 transition-colors duration-150 bg-red-100 rounded-full hover:bg-red-200 focus:outline-none"
                >
                  <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path
                      fill-rule="evenodd"
                      d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                      clip-rule="evenodd"
                    ></path>
                  </svg>
                </button>
              </td>
            </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>
