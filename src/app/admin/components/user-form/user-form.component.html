<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-6">
  <h2 class="text-2xl font-bold mb-6">{{ isEditMode ? 'Edit User' : 'Create New User' }}</h2>

  <!-- Full Name -->
  <div class="mb-4">
    <label for="full_name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
    <input
      id="full_name"
      type="text"
      formControlName="full_name"
      class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
    />
  </div>

  <!-- Email -->
  <div class="mb-4">
    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
    />
  </div>

  <!-- Role -->
  <div class="mb-4">
    <label for="role" class="block text-sm font-medium text-gray-700 mb-1">Role</label>
    <select
      id="role"
      formControlName="role"
      class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
    >
      <option value="ciclista">Ciclista</option>
      <option value="comerciante">Comerciante</option>
      <option value="creador_ruta">Creador de Ruta</option>
      <option value="administrador">Administrador</option>
    </select>
  </div>

  <!-- Password -->
  @if (!isEditMode) {
  <div class="mb-6">
    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
    />
    @if (userForm.get('password')?.hasError('required')) {
    <p class="text-red-500 text-xs mt-1">Password is required.</p>
    } @if (userForm.get('password')?.hasError('minlength')) {
    <p class="text-red-500 text-xs mt-1">Password must be at least 8 characters long.</p>
    }
  </div>
  }

  <!-- Actions -->
  <div class="flex justify-end space-x-4">
    <button
      type="button"
      (click)="onClose()"
      class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md hover:bg-gray-300"
    >
      Cancel
    </button>
    <button
      type="submit"
      [disabled]="userForm.invalid"
      class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 disabled:bg-indigo-300"
    >
      {{ isEditMode ? 'Update' : 'Create' }}
    </button>
  </div>
</form>
